spring.application.name=CharityDonation
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
server.port=8080

# Thông tin DB
spring.datasource.url=jdbc:mysql://localhost:3306/charity_donation_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1989
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Tự động tạo bảng từ code Java (Entity)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect